name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_PAT }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm install --save-dev @types/node

      - run: npx tsc -b

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Upload Frontend Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_PAT }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest tests

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    needs: [frontend-ci, backend-ci]

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_PAT }}
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.36.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.36.0
        with:
          category: "/language:${{matrix.language}}"

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    needs: [frontend-ci, backend-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Run Semgrep CI Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e SEMGREP_APP_TOKEN="${{ secrets.SEMGREP_APP_TOKEN }}" \
            semgrep/semgrep semgrep ci --secrets --sarif --output=/src/semgrep.sarif

      - name: Verify Semgrep SARIF was generated
        if: always() && hashFiles('semgrep.sarif') == ''
        run: |
          echo "Semgrep did not create semgrep.sarif; check the Semgrep scan logs above."
          exit 1

      - name: Upload Semgrep Scan Results
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: semgrep.sarif

  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [codeql, semgrep, backend-ci]

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.IAM_ECR_ROLE }}
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build locally first
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          push: false
          tags: myapp:scan

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: myapp:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/myapp:latest
            ${{ steps.login-ecr.outputs.registry }}/myapp:${{ github.sha }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [codeql, semgrep, build-and-push-image]
    environment: 
      name: production

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # Use repository variables for AWS credentials
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-deploy
          
      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Download Frontend Build Artifacts
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: dist

      - name: Push to S3
        run: aws s3 sync dist s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service --cluster ${{ vars.ECS_CLUSTER }} --service ${{ vars.ECS_SERVICE }} --force-new-deployment

      - name: Deploy to Production
        run: echo "Finished deploying to production environment..."