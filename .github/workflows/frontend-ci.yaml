name: Frontend CI

# This workflow runs on pushes and pull requests to the main branch, but only if the changes are in the frontend directory. It checks out the code, sets up Node.js, installs dependencies, runs type checking, linting, tests, and builds the frontend application.

on:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'frontend/**' ]
  

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - run: npm ci

    - run: npm run typecheck

    - run: npm run lint

    - run: npm test

    - run: npm run build
