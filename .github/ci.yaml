Name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '14'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - run: npm ci

    - run: npm run typecheck

    - run: npm run lint

    - run: npm test

    - run: npm run build
